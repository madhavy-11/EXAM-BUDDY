<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Exam Buddy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <h1>📚 Exam Buddy</h1>
            <p>Your Personal Exam Schedule Manager</p>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Left Panel: Add Exam Form -->
        <div class="panel add-panel">
            <h2>📝 Add New Exam</h2>
            
            <form id="examForm">
                <div class="form-group">
                    <label for="subject">Subject *</label>
                    <input type="text" id="subject" placeholder="e.g., Mathematics" required>
                </div>

                <div class="form-group">
                    <label for="date">Date *</label>
                    <input type="date" id="date" required>
                </div>

                <div class="form-group">
                    <label for="time">Time *</label>
                    <input type="time" id="time" required>
                </div>

                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" placeholder="e.g., Room 201">
                </div>

                <div class="form-group">
                    <label for="teacher">Teacher</label>
                    <input type="text" id="teacher" placeholder="e.g., Mr. Smith">
                </div>

                <button type="submit" class="btn btn-primary">➕ Add Exam</button>
                <button type="button" class="btn btn-secondary" onclick="clearForm()">🗑️ Clear</button>
            </form>
        </div>

        <!-- Right Panel: Exam List -->
        <div class="panel list-panel">
            <h2>📋 Your Exams</h2>
            
            <!-- Filter Buttons -->
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterExams('all')">📋 All</button>
                <button class="filter-btn" onclick="filterExams('upcoming')">🎯 Upcoming</button>
                <button class="filter-btn" onclick="filterExams('past')">⏰ Past</button>
                <button class="filter-btn" onclick="filterExams('today')">📅 Today</button>
            </div>

            <!-- Search Bar -->
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Search exams..." oninput="searchExams()">
                <button onclick="clearSearch()">✕</button>
            </div>

            <!-- Exam List -->
            <div id="examList">
                <p class="empty-state">📭 No exams yet. Add your first exam above!</p>
            </div>

            <!-- Stats -->
            <div class="stats-bar">
                <span id="totalExams">Total: 0 exams</span>
                <span id="upcomingCount">Upcoming: 0</span>
                <span id="pastCount">Past: 0</span>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>📚 Exam Buddy &copy; 2026 | Built with ❤️</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
